services:
  # FastAPI Backend Web Service
  - type: web
    name: socialengage-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: socialengage-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: socialengage-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: socialengage-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: socialengage-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: REFRESH_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: GROQ_API_KEY
        sync: false # Will prompt user to input their key in Render Dashboard

  # Redis instance for Celery Broker & Cache
  - type: redis
    name: socialengage-redis
    ipAllowList: [] # Only allow internal network traffic

databases:
  - name: socialengage-db
